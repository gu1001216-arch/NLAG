<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>NLAG — Modo Celular</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #1e2a3a; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    .btn-coletor { width: 100%; padding: 20px; font-size: 1.2rem; font-weight: 700; border-radius: 14px; margin-bottom: 14px; border: none; display: flex; align-items: center; justify-content: center; gap: 12px; transition: transform 0.1s, opacity 0.2s; }
    .btn-coletor:active { transform: scale(0.97); opacity: 0.85; }
    .btn-entrada  { background: #198754; color: #fff; }
    .btn-saida    { background: #dc3545; color: #fff; }
    .btn-saldo    { background: #0d6efd; color: #fff; }
    .btn-etiqueta { background: #6610f2; color: #fff; }
    .btn-historico{ background: #0dcaf0; color: #1e2a3a; }
    .btn-sair     { background: #495057; color: #fff; }
    .logo-box { text-align: center; margin-bottom: 32px; }
    .logo-box h2 { color: #fff; font-weight: 700; font-size: 1.8rem; }
    .logo-box p  { color: #6c757d; font-size: 0.85rem; }
    .footer-info { color: #3d5068; font-size: 0.75rem; text-align: center; margin-top: 20px; }
    .desktop-link { color: #6c757d; font-size: 0.78rem; text-align: center; margin-top: 10px; }
    .desktop-link a { color: #adb5bd; }
  </style>
</head>
<body>
  <div style="width:100%;max-width:360px;">
    <div class="logo-box">
      <i class="bi bi-boxes" style="font-size:3rem;color:#0d6efd;"></i>
      <h2>NLAG</h2>
      <p>Controle de Depósito — Modo Celular</p>
    </div>
    <a href="/entrada"          class="btn-coletor btn-entrada">
      <i class="bi bi-box-arrow-in-down" style="font-size:1.5rem;"></i> Entrada
    </a>
    <a href="/saida"            class="btn-coletor btn-saida">
      <i class="bi bi-box-arrow-up" style="font-size:1.5rem;"></i> Saída
    </a>
    <a href="/imprimir_etiqueta" class="btn-coletor btn-etiqueta">
      <i class="bi bi-tag" style="font-size:1.5rem;"></i> Imprimir Etiqueta
    </a>
    <a href="/"                 class="btn-coletor btn-saldo">
      <i class="bi bi-speedometer2" style="font-size:1.5rem;"></i> Ver Saldo
    </a>
    <a href="/historico"        class="btn-coletor btn-historico">
      <i class="bi bi-clock-history" style="font-size:1.5rem;"></i> Histórico
    </a>
    <a href="/logout"           class="btn-coletor btn-sair">
      <i class="bi bi-box-arrow-right" style="font-size:1.5rem;"></i> Sair
    </a>
    <div class="footer-info">IP: {{ request.remote_addr }}</div>
    <div class="desktop-link">
      <a href="/">Versão desktop completa</a>
    </div>
  </div>
</body>
</html>
