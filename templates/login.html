<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — Depósito NLAG</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #1e2a3a; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { background: #fff; border-radius: 16px; padding: 40px 36px; width: 100%; max-width: 400px; box-shadow: 0 8px 32px rgba(0,0,0,0.25); }
    .login-logo { font-size: 2.5rem; color: #1e2a3a; }
    .btn-login { background: #1e2a3a; color: #fff; border: none; padding: 12px; font-size: 1rem; font-weight: 600; border-radius: 8px; width: 100%; transition: background 0.2s; }
    .btn-login:hover { background: #2d3d50; color: #fff; }
  </style>
</head>
<body>
  <div class="login-card text-center">
    <div class="login-logo mb-2"><i class="bi bi-boxes"></i></div>
    <h4 class="fw-bold mb-1">NLAG</h4>
    <p class="text-muted mb-4" style="font-size:0.9rem;">Controle de Depósito</p>
    {% if erro %}
      <div class="alert alert-danger py-2">{{ erro }}</div>
    {% endif %}
    <form method="POST">
      <div class="mb-3 text-start">
        <label class="form-label fw-bold">Usuário</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" name="usuario" class="form-control form-control-lg"
                 placeholder="Digite o usuário" autofocus required>
        </div>
      </div>
      <div class="mb-4 text-start">
        <label class="form-label fw-bold">Senha</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="senha" class="form-control form-control-lg"
                 placeholder="Digite a senha" required>
        </div>
      </div>
      <button type="submit" class="btn-login">
        <i class="bi bi-box-arrow-in-right"></i> Entrar
      </button>
    </form>
  </div>
</body>
</html>
