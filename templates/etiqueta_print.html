<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Etiqueta — {{ material.codigo }}</title>
  <style>
    /* ── Tamanho exato da etiqueta: 100mm × 50mm ── */
    @page {
      size: 100mm 50mm;
      margin: 0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100mm;
      height: 50mm;
      overflow: hidden;
      background: #fff;
    }

    .etiqueta {
      width: 100mm;
      height: 50mm;
      padding: 2mm 3mm;
      font-family: 'Arial Narrow', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* ── Cabeçalho ── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 0.4mm solid #000;
      padding-bottom: 1mm;
    }
    .header .empresa {
      font-size: 7pt;
      font-weight: 900;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .header .data {
      font-size: 6pt;
      color: #333;
    }

    /* ── Corpo ── */
    .corpo {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0.5mm;
      padding: 1mm 0;
    }

    .linha-codigo {
      display: flex;
      align-items: baseline;
      gap: 2mm;
    }
    .label-campo {
      font-size: 5.5pt;
      color: #555;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .valor-codigo {
      font-size: 12pt;
      font-weight: 900;
      letter-spacing: 1px;
    }
    .valor-unidade {
      font-size: 6pt;
      background: #1e2a3a;
      color: #fff;
      padding: 0.3mm 1.5mm;
      border-radius: 2px;
      margin-left: auto;
    }

    .linha-descricao {
      font-size: 7pt;
      font-weight: 700;
      text-transform: uppercase;
      line-height: 1.2;
      color: #111;
      /* Quebra em 2 linhas se necessário */
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── Código de barras ── */
    .barcode-area {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      border-top: 0.3mm solid #ddd;
      padding-top: 1mm;
    }
    .barcode-area img {
      height: 10mm;
      max-width: 94mm;
      object-fit: contain;
    }
  </style>
</head>
<body>

<div class="etiqueta">

  <!-- CABEÇALHO -->
  <div class="header">
    <span class="empresa">NLAG — DEPÓSITO</span>
    <span class="data">{{ agora }}</span>
  </div>

  <!-- CORPO -->
  <div class="corpo">
    <div class="linha-codigo">
      <span class="label-campo">Cód:</span>
      <span class="valor-codigo">{{ material.codigo }}</span>
      <span class="valor-unidade">{{ material.unidade }}</span>
    </div>
    <div class="linha-descricao">{{ material.descricao }}</div>
  </div>

  <!-- CÓDIGO DE BARRAS -->
  {% if barcode_img %}
  <div class="barcode-area">
    <img src="data:image/png;base64,{{ barcode_img }}" alt="{{ material.codigo }}">
  </div>
  {% endif %}

</div>

<script>
  // Imprime automaticamente ao abrir e fecha a janela depois
  window.addEventListener('load', function () {
    // Pequeno delay para garantir que a imagem do barcode carregou
    setTimeout(function () {
      window.print();
      // Fecha a janela após a impressão (funciona na maioria dos navegadores)
      window.onafterprint = function () {
        window.close();
      };
    }, 400);
  });
</script>

</body>
</html>
