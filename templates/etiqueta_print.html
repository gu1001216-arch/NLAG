<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Etiqueta {{ material.codigo }}</title>
  <style>
    @page {
      size: 100mm 50mm landscape;
      margin: 0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    html, body {
      width: 100mm;
      height: 50mm;
      overflow: hidden;
      background: #fff;
      /* Força orientação correta */
      transform-origin: top left;
    }

    .etiqueta {
      width: 100mm;
      height: 50mm;
      padding: 2mm 3mm 2mm 3mm;
      /* Fonte sem serifa e sem antialiasing para impressão térmica */
      font-family: Arial, Helvetica, sans-serif;
      -webkit-font-smoothing: none;
      font-smooth: never;
      display: flex;
      flex-direction: column;
      gap: 1mm;
      background: #fff;
    }

    /* ── CABEÇALHO ── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 0.4mm solid #000;
      padding-bottom: 0.8mm;
      flex-shrink: 0;
    }
    .header .empresa {
      font-size: 7.5pt;
      font-weight: 900;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      color: #000;
    }
    .header .data {
      font-size: 6pt;
      color: #000;
      white-space: nowrap;
    }

    /* ── LINHA CÓDIGO ── */
    .linha-codigo {
      display: flex;
      align-items: center;
      gap: 1.5mm;
      flex-shrink: 0;
    }
    .label-cod {
      font-size: 5.5pt;
      color: #444;
      white-space: nowrap;
    }
    .valor-codigo {
      font-size: 13pt;
      font-weight: 900;
      letter-spacing: 1px;
      line-height: 1;
      color: #000;
    }
    .badge-unidade {
      margin-left: auto;
      font-size: 6pt;
      font-weight: 700;
      background: #000;
      color: #fff;
      padding: 0.8mm 1.5mm;
      border-radius: 1.5px;
      white-space: nowrap;
    }

    /* ── DESCRIÇÃO ── */
    .descricao {
      font-size: 7pt;
      font-weight: 700;
      text-transform: uppercase;
      line-height: 1.2;
      color: #000;
      flex-shrink: 0;
      overflow: hidden;
      max-height: 8mm;
    }

    /* ── ÁREA DO CÓDIGO DE BARRAS ── */
    .barcode-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      border-top: 0.3mm solid #999;
      padding-top: 0.8mm;
      overflow: hidden;
    }

    .barcode-area img {
      /* Mantém proporção original — NÃO estica */
      width: auto;
      height: 12mm;
      max-width: 94mm;
      object-fit: contain;
      object-position: center;
      display: block;
      /* Remove filtros que causam falhas */
      image-rendering: pixelated;
    }

    .barcode-num {
      font-size: 5.5pt;
      letter-spacing: 1.5px;
      color: #000;
      margin-top: 0.5mm;
      font-family: 'Courier New', Courier, monospace;
      font-weight: 700;
    }
  </style>
</head>
<body>
<div class="etiqueta">

  <!-- CABEÇALHO -->
  <div class="header">
    <span class="empresa">NLAG — DEPÓSITO</span>
    <span class="data">{{ agora }}</span>
  </div>

  <!-- CÓDIGO + UNIDADE -->
  <div class="linha-codigo">
    <span class="label-cod">Cód:</span>
    <span class="valor-codigo">{{ material.codigo }}</span>
    <span class="badge-unidade">{{ material.unidade }}</span>
  </div>

  <!-- DESCRIÇÃO -->
  <div class="descricao">{{ material.descricao }}</div>

  <!-- CÓDIGO DE BARRAS -->
  {% if barcode_img %}
  <div class="barcode-area">
    <img src="data:image/png;base64,{{ barcode_img }}"
         alt="{{ material.codigo }}">
    <div class="barcode-num">{{ material.codigo }}</div>
  </div>
  {% endif %}

</div>

<script>
window.addEventListener('load', function () {
  const img = document.querySelector('.barcode-area img');

  function doPrint() {
    // Delay maior para garantir renderização completa
    setTimeout(function () {
      window.print();
      window.onafterprint = function () {
        window.close();
      };
    }, 600);
  }

  if (img) {
    if (img.complete && img.naturalWidth > 0) {
      doPrint();
    } else {
      img.addEventListener('load',  doPrint);
      img.addEventListener('error', doPrint);
    }
  } else {
    doPrint();
  }
});
</script>
</body>
</html>
