<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Etiqueta {{ material.codigo }}</title>
  <style>

    /* Diz ao sistema: página retrato 50×100mm (como a Zebra enxerga) */
    @page {
      size: 50mm 100mm;
      margin: 0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }

    html, body {
      width:  50mm;
      height: 100mm;
      overflow: hidden;
      background: #fff;
    }

    /*
      O truque: criamos o conteúdo em 100×50mm (paisagem)
      e rotacionamos -90° para caber na página 50×100mm (retrato).
      Resultado final na impressora: correto e legível.
    */
    .etiqueta {
      width:  100mm;
      height: 50mm;
      padding: 2.5mm 3mm 2mm 3mm;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: #fff;

      /* Posiciona e gira */
      position: absolute;
      top:  50mm;
      left: 0mm;
      transform: rotate(-90deg);
      transform-origin: top left;
    }

    /* ── CABEÇALHO ── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 0.5mm solid #000;
      padding-bottom: 1mm;
    }
    .empresa {
      font-size: 9pt;
      font-weight: 900;
      text-transform: uppercase;
      color: #000;
    }
    .data {
      font-size: 7pt;
      color: #000;
    }

    /* ── CÓDIGO + UNIDADE ── */
    .linha-codigo {
      display: flex;
      align-items: center;
      gap: 2mm;
    }
    .label-cod {
      font-size: 7pt;
      color: #444;
    }
    .valor-codigo {
      font-size: 18pt;
      font-weight: 900;
      color: #000;
      letter-spacing: 1.5px;
      line-height: 1;
    }
    .badge-un {
      margin-left: auto;
      font-size: 7pt;
      font-weight: 900;
      background: #000;
      color: #fff;
      padding: 1mm 2.5mm;
      border-radius: 2px;
    }

    /* ── DESCRIÇÃO ── */
    .descricao {
      font-size: 8pt;
      font-weight: 700;
      text-transform: uppercase;
      color: #000;
      line-height: 1.25;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    /* ── CÓDIGO DE BARRAS GRANDE ── */
    .barcode-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-top: 0.3mm solid #999;
      padding-top: 1mm;
      flex: 1;
    }
    .barcode-wrap img {
      width:  94mm;
      height: 13mm;
      object-fit: fill;
      display: block;
    }
    .barcode-texto {
      font-size: 7pt;
      font-family: 'Courier New', monospace;
      font-weight: 700;
      letter-spacing: 3px;
      color: #000;
      margin-top: 0.5mm;
    }

  </style>
</head>
<body>
<div class="etiqueta">

  <div class="header">
    <span class="empresa">NLAG — DEPÓSITO</span>
    <span class="data">{{ agora }}</span>
  </div>

  <div class="linha-codigo">
    <span class="label-cod">Cód:</span>
    <span class="valor-codigo">{{ material.codigo }}</span>
    <span class="badge-un">{{ material.unidade }}</span>
  </div>

  <div class="descricao">{{ material.descricao }}</div>

  {% if barcode_img %}
  <div class="barcode-wrap">
    <img src="data:image/png;base64,{{ barcode_img }}"
         alt="{{ material.codigo }}">
    <span class="barcode-texto">{{ material.codigo }}</span>
  </div>
  {% endif %}

</div>

<script>
window.addEventListener('load', function () {
  var img = document.querySelector('.barcode-wrap img');
  function doPrint() {
    setTimeout(function () {
      window.print();
      window.onafterprint = function () { window.close(); };
    }, 600);
  }
  if (img) {
    if (img.complete && img.naturalWidth > 0) { doPrint(); }
    else { img.onload = doPrint; img.onerror = doPrint; }
  } else {
    doPrint();
  }
});
</script>
</body>
</html>
