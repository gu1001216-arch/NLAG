<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Etiqueta {{ material.codigo }}</title>
  <style>
    @page {
      size: 100mm 50mm;
      margin: 0mm;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    html, body {
      width: 100mm;
      height: 50mm;
      overflow: hidden;
      background: #fff;
    }

    .etiqueta {
      width: 100mm;
      height: 50mm;
      padding: 2mm 3mm 1.5mm 3mm;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* ── CABEÇALHO ── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 0.5mm solid #000;
      padding-bottom: 1mm;
    }
    .header .empresa {
      font-size: 8pt;
      font-weight: 900;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }
    .header .data {
      font-size: 6.5pt;
      color: #333;
      white-space: nowrap;
    }

    /* ── CÓDIGO ── */
    .linha-codigo {
      display: flex;
      align-items: center;
      gap: 2mm;
      margin-top: 1mm;
    }
    .label-cod {
      font-size: 6pt;
      color: #555;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .valor-codigo {
      font-size: 14pt;
      font-weight: 900;
      letter-spacing: 1.5px;
      line-height: 1;
    }
    .badge-unidade {
      margin-left: auto;
      font-size: 6.5pt;
      font-weight: 700;
      background: #1e2a3a;
      color: #fff;
      padding: 1mm 2mm;
      border-radius: 2px;
      white-space: nowrap;
    }

    /* ── DESCRIÇÃO ── */
    .descricao {
      font-size: 7.5pt;
      font-weight: 700;
      text-transform: uppercase;
      line-height: 1.25;
      color: #111;
      margin-top: 0.8mm;
      /* máximo 2 linhas */
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── CÓDIGO DE BARRAS — ocupa o máximo de espaço ── */
    .barcode-area {
      border-top: 0.3mm solid #ccc;
      padding-top: 1mm;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      flex: 1;
      margin-top: 1mm;
    }
    .barcode-area img {
      /* Altura grande para fácil leitura */
      height: 14mm;
      width: 94mm;
      object-fit: fill;
      display: block;
    }
    .barcode-num {
      font-size: 6pt;
      letter-spacing: 2px;
      color: #222;
      margin-top: 0.3mm;
      font-family: 'Courier New', monospace;
    }
  </style>
</head>
<body>
<div class="etiqueta">

  <!-- CABEÇALHO -->
  <div class="header">
    <span class="empresa">NLAG — DEPÓSITO</span>
    <span class="data">{{ agora }}</span>
  </div>

  <!-- CÓDIGO + UNIDADE -->
  <div class="linha-codigo">
    <span class="label-cod">Cód:</span>
    <span class="valor-codigo">{{ material.codigo }}</span>
    <span class="badge-unidade">{{ material.unidade }}</span>
  </div>

  <!-- DESCRIÇÃO -->
  <div class="descricao">{{ material.descricao }}</div>

  <!-- CÓDIGO DE BARRAS GRANDE -->
  {% if barcode_img %}
  <div class="barcode-area">
    <img src="data:image/png;base64,{{ barcode_img }}" alt="{{ material.codigo }}">
    <div class="barcode-num">{{ material.codigo }}</div>
  </div>
  {% endif %}

</div>

<script>
  window.addEventListener('load', function () {
    // Aguarda imagem do barcode carregar completamente
    const img = document.querySelector('.barcode-area img');
    function doPrint() {
      setTimeout(function () {
        window.print();
        window.onafterprint = function () { window.close(); };
      }, 300);
    }
    if (img) {
      if (img.complete) {
        doPrint();
      } else {
        img.addEventListener('load', doPrint);
        img.addEventListener('error', doPrint);
      }
    } else {
      doPrint();
    }
  });
</script>
</body>
</html>
