<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Etiqueta {{ material.codigo }}</title>
  <style>

    @page {
      size: 50mm 100mm portrait;
      margin: 0mm;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }

    html, body {
      width: 50mm;
      height: 100mm;
      overflow: hidden;
      background: #fff;
    }

    /*
      Página física: 50mm (largura) × 100mm (altura) — RETRATO
      Conteúdo da etiqueta: 100mm × 50mm — PAISAGEM
      Técnica: cria div de 96mm × 46mm (com margem de 2mm dos bordos),
      posiciona no centro da página e gira +90°
    */
    .etiqueta {
      position: absolute;
      width:  96mm;
      height: 46mm;
      top:  50mm;   /* centro vertical da página 100mm */
      left: -23mm;  /* (50mm - 96mm) / 2 = -23mm */
      transform: rotate(90deg);
      transform-origin: top left;
      padding: 2mm 2.5mm 1.5mm 2.5mm;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: #fff;
      border: 0.3mm solid #ccc;
    }

    /* CABEÇALHO */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 0.4mm solid #000;
      padding-bottom: 1mm;
      flex-shrink: 0;
    }
    .empresa {
      font-size: 8.5pt;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #000;
    }
    .data {
      font-size: 6.5pt;
      color: #333;
    }

    /* LINHA DO CÓDIGO */
    .linha-codigo {
      display: flex;
      align-items: center;
      gap: 1.5mm;
      flex-shrink: 0;
    }
    .label-cod {
      font-size: 6.5pt;
      color: #555;
    }
    .valor-codigo {
      font-size: 17pt;
      font-weight: 900;
      letter-spacing: 1px;
      line-height: 1;
      color: #000;
    }
    .badge-un {
      margin-left: auto;
      font-size: 7pt;
      font-weight: 900;
      background: #000;
      color: #fff;
      padding: 0.8mm 2mm;
      border-radius: 2px;
    }

    /* DESCRIÇÃO */
    .descricao {
      font-size: 7.5pt;
      font-weight: 700;
      text-transform: uppercase;
      color: #000;
      line-height: 1.2;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      flex-shrink: 0;
    }

    /* CÓDIGO DE BARRAS */
    .barcode-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-top: 0.3mm solid #aaa;
      padding-top: 1mm;
      flex: 1;
    }
    .barcode-wrap img {
      width:  91mm;
      height: 13mm;
      object-fit: fill;
      display: block;
      image-rendering: pixelated;
    }
    .barcode-texto {
      font-size: 6.5pt;
      font-family: 'Courier New', monospace;
      font-weight: 700;
      letter-spacing: 3px;
      color: #000;
      margin-top: 0.5mm;
    }

  </style>
</head>
<body>
<div class="etiqueta">

  <div class="header">
    <span class="empresa">NLAG — DEPÓSITO</span>
    <span class="data">{{ agora }}</span>
  </div>

  <div class="linha-codigo">
    <span class="label-cod">Cód:</span>
    <span class="valor-codigo">{{ material.codigo }}</span>
    <span class="badge-un">{{ material.unidade }}</span>
  </div>

  <div class="descricao">{{ material.descricao }}</div>

  {% if barcode_img %}
  <div class="barcode-wrap">
    <img src="data:image/png;base64,{{ barcode_img }}"
         alt="{{ material.codigo }}">
    <span class="barcode-texto">{{ material.codigo }}</span>
  </div>
  {% endif %}

</div>

<script>
window.addEventListener('load', function () {
  var img = document.querySelector('.barcode-wrap img');
  function doPrint() {
    setTimeout(function () {
      window.print();
      window.onafterprint = function () { window.close(); };
    }, 800);
  }
  if (img) {
    if (img.complete && img.naturalWidth > 0) { doPrint(); }
    else { img.onload = doPrint; img.onerror = doPrint; }
  } else {
    doPrint();
  }
});
</script>
</body>
</html>
