<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Etiqueta {{ material.codigo }}</title>
<style>
  /* ── Reset total ── */
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  /* ── Página 100 × 50 mm, paisagem, sem margens ── */
  @page {
    size: 100mm 50mm landscape;
    margin: 0mm;
  }

  html, body {
    width:  100mm;
    height: 50mm;
    overflow: hidden;
    background: #fff;
  }

  /* ── Container principal: centraliza tudo ── */
  .etiqueta {
    width:  100mm;
    height: 50mm;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2mm 3mm;
    font-family: Arial, Helvetica, sans-serif;
    color: #000;
    background: #fff;
    text-align: center;
  }

  /* ── Cabeçalho: empresa + data ── */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    margin-bottom: 1mm;
  }
  .empresa {
    font-size: 7.5pt;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .data {
    font-size: 6pt;
    color: #333;
  }

  /* ── Código + unidade ── */
  .linha-codigo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    width: 100%;
    margin-bottom: 1mm;
  }
  .valor-codigo {
    font-size: 16pt;
    font-weight: 900;
    letter-spacing: 1px;
    line-height: 1;
  }
  .badge-unidade {
    font-size: 7pt;
    font-weight: 700;
    background: #222;
    color: #fff;
    border-radius: 3px;
    padding: 1px 4px;
  }

  /* ── Descrição ── */
  .descricao {
    font-size: 7pt;
    font-weight: 600;
    text-transform: uppercase;
    width: 100%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 1.5mm;
    text-align: center;
  }

  /* ── Área do código de barras ── */
  .barcode-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
  }
  .barcode-area img {
    display: block;
    width:  90mm;
    height: 11mm;
    /* mantém barras nítidas sem interpolação */
    image-rendering: -webkit-optimize-contrast;
    image-rendering: crisp-edges;
    image-rendering: pixelated;
    object-fit: fill;
  }
  .barcode-texto {
    font-size: 7pt;
    font-family: 'Courier New', monospace;
    font-weight: 700;
    letter-spacing: 2px;
    margin-top: 0.5mm;
  }

  /* ── Ocultar tudo ao imprimir exceto a etiqueta ── */
  @media print {
    body { background: #fff; }
    .no-print { display: none !important; }
  }
</style>
</head>
<body>

<div class="etiqueta">

  <!-- Cabeçalho -->
  <div class="header">
    <span class="empresa">NLAG — Depósito</span>
    <span class="data">{{ agora }}</span>
  </div>

  <!-- Código + unidade -->
  <div class="linha-codigo">
    <span class="valor-codigo">{{ material.codigo }}</span>
    <span class="badge-unidade">{{ material.unidade }}</span>
  </div>

  <!-- Descrição -->
  <div class="descricao" title="{{ material.descricao }}">
    {{ material.descricao }}
  </div>

  <!-- Código de barras -->
  <div class="barcode-area">
    {% if barcode_img %}
      <img id="barcode-img"
           src="data:image/png;base64,{{ barcode_img }}"
           alt="Código de barras {{ material.codigo }}">
    {% endif %}
    <span class="barcode-texto">{{ material.codigo }}</span>
  </div>

</div>

<script>
  (function () {
    function doPrint() {
      window.print();
      // fecha a aba após impressão (funciona na maioria dos browsers)
      setTimeout(function () { window.close(); }, 800);
    }

    var img = document.getElementById('barcode-img');
    if (img) {
      if (img.complete) {
        setTimeout(doPrint, 400);
      } else {
        img.addEventListener('load',  function () { setTimeout(doPrint, 400); });
        img.addEventListener('error', function () { setTimeout(doPrint, 400); });
      }
    } else {
      setTimeout(doPrint, 400);
    }
  })();
</script>

</body>
</html>
