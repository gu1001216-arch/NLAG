<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>NLAG — Coletor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background: #1e2a3a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .titulo    { color:#fff; font-size:1.5rem; font-weight:700;
                 text-align:center; letter-spacing:2px; }
    .subtitulo { color:#6c757d; font-size:0.85rem;
                 text-align:center; margin-bottom:32px; }
    .btn-coletor {
      width: 100%; max-width: 360px;
      padding: 24px 16px; font-size: 1.25rem; font-weight: 700;
      border-radius: 16px; margin-bottom: 16px; border: none;
      display: flex; align-items: center; justify-content: center;
      gap: 14px; text-decoration: none;
      transition: transform 0.1s, opacity 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-coletor:active  { transform: scale(0.97); opacity: 0.85; }
    .btn-coletor i       { font-size: 2rem; }
    .btn-entrada         { background:#198754; color:#fff; }
    .btn-saida           { background:#dc3545; color:#fff; }
    .btn-saldo           { background:#0d6efd; color:#fff; }
    .btn-historico       { background:#6f42c1; color:#fff; }
    .btn-sair            { background:#495057; color:#fff; }
    .rodape              { color:#495057; font-size:0.75rem;
                           text-align:center; margin-top:28px; }
    .versao-pc {
      position: fixed; bottom: 16px; right: 16px;
    }
  </style>
</head>
<body>
  <div class="titulo">📦 NLAG</div>
  <div class="subtitulo">Depósito — Modo Celular</div>

  <a href="/entrada"   class="btn-coletor btn-entrada">
    <i class="bi bi-box-arrow-in-down"></i> <span>ENTRADA</span>
  </a>
  <a href="/saida"     class="btn-coletor btn-saida">
    <i class="bi bi-box-arrow-up"></i> <span>SAÍDA</span>
  </a>
  <a href="/"          class="btn-coletor btn-saldo">
    <i class="bi bi-speedometer2"></i> <span>VER SALDO</span>
  </a>
  <a href="/historico" class="btn-coletor btn-historico">
    <i class="bi bi-clock-history"></i> <span>HISTÓRICO</span>
  </a>
  <a href="/logout"    class="btn-coletor btn-sair">
    <i class="bi bi-box-arrow-right"></i> <span>SAIR</span>
  </a>

  <div class="rodape">
    Conectado via Wi-Fi &nbsp;|&nbsp; {{ request.remote_addr }}
  </div>

  <a href="/" class="versao-pc btn btn-outline-secondary btn-sm">
    <i class="bi bi-display"></i> Versão PC
  </a>
</body>
</html>
