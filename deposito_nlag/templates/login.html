<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — Depósito NLAG</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #1e2a3a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .logo-area          { text-align: center; margin-bottom: 28px; }
    .logo-area .icone   { font-size: 3rem; }
    .logo-area h4       { font-weight: 700; margin: 8px 0 2px; letter-spacing: 1px; }
    .logo-area small    { color: #6c757d; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo-area">
      <div class="icone">📦</div>
      <h4>NLAG</h4>
      <small>Controle de Depósito</small>
    </div>
    {% if erro %}
      <div class="alert alert-danger">{{ erro }}</div>
    {% endif %}
    <form method="POST">
      <div class="mb-3">
        <label class="form-label fw-bold">Usuário</label>
        <input type="text" name="usuario" class="form-control form-control-lg"
               placeholder="Digite seu usuário" autofocus required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">Senha</label>
        <input type="password" name="senha" class="form-control form-control-lg"
               placeholder="Digite sua senha" required>
      </div>
      <button type="submit" class="btn btn-dark btn-lg w-100 mt-2">
        Entrar
      </button>
    </form>
  </div>
</body>
</html>
